<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Nova Wallet – Create Password</title>
  <link rel="stylesheet" href="../css/nova.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/bold/style.css" />
  <style>
    .strength-bar {
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      overflow: hidden;
      margin-top: 6px;
    }

    .strength-fill {
      height: 100%;
      border-radius: 2px;
      width: 0;
      transition: width .4s, background .4s;
    }

    #importSection {
      display: none;
    }
  </style>
</head>

<body>
  <div class="phone-frame">
    <div class="screen" style="display:flex;flex-direction:column;height:100%;">
      <nav class="top-nav" style="flex-shrink:0;">
        <a href="onboarding.html" class="back-btn"><i class="ph-bold ph-arrow-left"></i></a>
        <div class="top-nav-title">
          <h4 id="pageTitle">Create Password</h4>
        </div>
        <div style="width:36px;"></div>
      </nav>
      <!-- progress dots -->
      <div style="display:flex;justify-content:center;gap:6px;padding:4px 0 16px;" id="progressDots">
        <div style="width:24px;height:4px;border-radius:2px;background:var(--green);"></div>
        <div style="width:8px;height:4px;border-radius:2px;background:var(--border);"></div>
        <div style="width:8px;height:4px;border-radius:2px;background:var(--border);"></div>
        <div style="width:8px;height:4px;border-radius:2px;background:var(--border);"></div>
      </div>
      <div style="flex:1;overflow-y:auto;padding:0 24px 32px;" class="fade-in">
        <p style="color:var(--muted);font-size:14px;margin-bottom:24px;" id="pageDesc">
          This password unlocks your Nova Wallet only on this device. Nova cannot recover it.
        </p>
        <!-- CREATE MODE -->
        <div id="createSection">
          <div class="form-group mb-16">
            <label class="form-label">New Password <span style="color:var(--muted);font-weight:400;">(min 8
                characters)</span></label>
            <div class="input-wrap">
              <i class="ph-bold ph-lock icon"></i>
              <input type="password" id="pw1" class="nova-input has-icon has-icon-right" placeholder="New password"
                oninput="checkStrength()" />
              <button class="icon-right" onclick="toggle('pw1',this)" type="button"><i
                  class="ph-bold ph-eye"></i></button>
            </div>
            <div class="strength-bar mt-4">
              <div class="strength-fill" id="strengthFill"></div>
            </div>
            <div style="font-size:11px;color:var(--muted);margin-top:3px;" id="strengthLabel"></div>
          </div>
          <div class="form-group mb-20">
            <label class="form-label">Confirm Password</label>
            <div class="input-wrap">
              <i class="ph-bold ph-lock icon"></i>
              <input type="password" id="pw2" class="nova-input has-icon has-icon-right" placeholder="Confirm password"
                oninput="checkMatch()" />
              <button class="icon-right" onclick="toggle('pw2',this)" type="button"><i
                  class="ph-bold ph-eye"></i></button>
            </div>
            <div style="font-size:12px;color:var(--error);margin-top:4px;min-height:16px;" id="matchMsg"></div>
          </div>
        </div>
        <!-- IMPORT MODE -->
        <div id="importSection">
          <div class="form-group mb-20">
            <label class="form-label">Secret Recovery Phrase</label>
            <textarea id="srpImport" class="nova-input" rows="4"
              placeholder="Enter your 12 or 24-word Secret Recovery Phrase, separated by spaces"
              style="resize:none;line-height:1.7;font-family:var(--font);"></textarea>
            <div style="font-size:12px;color:var(--muted);margin-top:6px;"><i class="ph-bold ph-shield-check"
                style="color:var(--green);"></i> Your phrase is only stored locally on this device.</div>
          </div>
          <div class="form-group mb-20">
            <label class="form-label">New Password</label>
            <div class="input-wrap">
              <i class="ph-bold ph-lock icon"></i>
              <input type="password" id="pw1i" class="nova-input has-icon has-icon-right"
                placeholder="Create a password" />
              <button class="icon-right" onclick="toggle('pw1i',this)" type="button"><i
                  class="ph-bold ph-eye"></i></button>
            </div>
          </div>
          <div class="form-group mb-20">
            <label class="form-label">Confirm Password</label>
            <div class="input-wrap">
              <i class="ph-bold ph-lock icon"></i>
              <input type="password" id="pw2i" class="nova-input has-icon has-icon-right"
                placeholder="Confirm password" />
              <button class="icon-right" onclick="toggle('pw2i',this)" type="button"><i
                  class="ph-bold ph-eye"></i></button>
            </div>
          </div>
        </div>
        <!-- Terms -->
        <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer;margin-bottom:24px;">
          <input type="checkbox" id="agreeBox"
            style="margin-top:3px;accent-color:var(--green);width:16px;height:16px;flex-shrink:0;"
            onchange="validate()" />
          <span style="font-size:13px;color:var(--muted);line-height:1.6;">
            I understand that Nova Wallet cannot recover this password for me.
            <a href="#" style="color:var(--green);">Learn more</a>
          </span>
        </label>
        <div id="formError" class="error-msg mb-16" style="display:none;">
          <i class="ph-bold ph-warning"></i> <span id="formErrMsg"></span>
        </div>
        <button class="btn btn-primary" id="continueBtn" onclick="proceed()">Create Wallet</button>
      </div>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const mode = params.get('mode') || 'create';
    if (mode === 'import') {
      document.getElementById('pageTitle').textContent = 'Import Wallet';
      document.getElementById('pageDesc').textContent = 'Enter your Secret Recovery Phrase and create a password for this device.';
      document.getElementById('continueBtn').textContent = '\uD83D\uDCE5  Import Wallet';
      document.getElementById('createSection').style.display = 'none';
      document.getElementById('importSection').style.display = 'block';
      document.getElementById('progressDots').style.display = 'none';
    }
    function toggle(id, btn) {
      const el = document.getElementById(id);
      el.type = el.type === 'password' ? 'text' : 'password';
      btn.innerHTML = el.type === 'text' ? '<i class="ph-bold ph-eye-slash"></i>' : '<i class="ph-bold ph-eye"></i>';
    }
    function checkStrength() {
      const v = document.getElementById('pw1').value;
      const fill = document.getElementById('strengthFill');
      const lbl = document.getElementById('strengthLabel');
      let score = 0;
      if (v.length >= 8) score++;
      if (v.length >= 12) score++;
      if (/[A-Z]/.test(v)) score++;
      if (/[0-9]/.test(v)) score++;
      if (/[^A-Za-z0-9]/.test(v)) score++;
      const map = ['', '10%', '30%', '55%', '80%', '100%'];
      const col = ['', '#ff4d4d', '#ff8c00', '#ffc83d', '#3DFF20', '#3DFF20'];
      const lab = ['', 'Very weak', 'Weak', 'Fair', 'Strong', 'Very strong'];
      fill.style.width = map[score];
      fill.style.background = col[score];
      lbl.textContent = v ? lab[score] : '';
      lbl.style.color = col[score];
      checkMatch();
    }
    function hasEmoji(str) {
      return /[^\x20-\x7E]/.test(str);
    }
    /* ── crypto helpers ── */
    const bytesToHex = b => Array.from(b).map(x => x.toString(16).padStart(2, '0')).join('');
    const hexToBytes = h => new Uint8Array(h.match(/.{2}/g).map(x => parseInt(x, 16)));
    async function pbkdf2Hash(pw) {
      const salt = crypto.getRandomValues(new Uint8Array(16));
      const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveBits']);
      const bits = await crypto.subtle.deriveBits({ name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' }, km, 256);
      return bytesToHex(salt) + ':' + bytesToHex(new Uint8Array(bits));
    }
    async function deriveExportSrpKey(pw) {
      const salt = hexToBytes(localStorage.getItem('nv_srp_salt'));
      const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
      const key = await crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
        km, { name: 'AES-GCM', length: 256 }, true, ['encrypt', 'decrypt']
      );
      return bytesToHex(new Uint8Array(await crypto.subtle.exportKey('raw', key)));
    }
    async function encryptSrp(keyHex, srpArray) {
      const key = await crypto.subtle.importKey('raw', hexToBytes(keyHex), { name: 'AES-GCM' }, false, ['encrypt']);
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const enc = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, new TextEncoder().encode(JSON.stringify(srpArray)));
      return bytesToHex(iv) + ':' + btoa(String.fromCharCode(...new Uint8Array(enc)));
    }
    function checkMatch() {
      const v1 = document.getElementById('pw1').value;
      const v2 = document.getElementById('pw2').value;
      const msg = document.getElementById('matchMsg');
      if (v2 && v1 !== v2) { msg.textContent = 'Passwords do not match'; }
      else if (v2 && v1 === v2) { msg.textContent = ''; }
      else { msg.textContent = ''; }
    }
    function validate() { /* just enables button visually */ }
    async function proceed() {
      const errEl = document.getElementById('formError');
      const errMsg = document.getElementById('formErrMsg');
      const agreed = document.getElementById('agreeBox').checked;
      function err(m) { errMsg.textContent = m; errEl.style.display = 'flex'; return false; }
      errEl.style.display = 'none';
      if (!agreed) return err('Please agree to the terms above.');
      if (mode === 'import') {
        const srp = document.getElementById('srpImport').value.trim();
        const words = srp.split(/\s+/).filter(Boolean);
        if (words.length !== 12 && words.length !== 24) return err('Enter a valid 12 or 24-word recovery phrase.');
        const p1 = document.getElementById('pw1i').value;
        const p2 = document.getElementById('pw2i').value;
        if (p1.length < 8) return err('Password must be at least 8 characters.');
        if (hasEmoji(p1)) return err('Password must only contain letters, numbers and standard symbols.');
        if (p1 !== p2) return err('Passwords do not match.');
        localStorage.setItem('nv_srp_salt', bytesToHex(crypto.getRandomValues(new Uint8Array(16))));
        localStorage.setItem('nv_password', await pbkdf2Hash(p1));
        const encKeyHex = await deriveExportSrpKey(p1);
        sessionStorage.setItem('nv_enc_key', encKeyHex);
        localStorage.setItem('nv_srp', await encryptSrp(encKeyHex, words));
        localStorage.setItem('nv_imported', '1');
        location.href = 'success.html?mode=import';
      } else {
        const p1 = document.getElementById('pw1').value;
        const p2 = document.getElementById('pw2').value;
        if (p1.length < 8) return err('Password must be at least 8 characters.');
        if (hasEmoji(p1)) return err('Password must only contain letters, numbers and standard symbols.');
        if (p1 !== p2) return err('Passwords do not match.');
        localStorage.setItem('nv_srp_salt', bytesToHex(crypto.getRandomValues(new Uint8Array(16))));
        localStorage.setItem('nv_password', await pbkdf2Hash(p1));
        const encKeyHex = await deriveExportSrpKey(p1);
        sessionStorage.setItem('nv_enc_key', encKeyHex);
        location.href = 'email.html';
      }
    }
  </script>
</body>

</html>
