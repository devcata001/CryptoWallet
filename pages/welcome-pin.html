<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Nova Wallet – Unlock Wallet</title>
  <link rel="stylesheet" href="../css/nova.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/bold/style.css" />
  <style>
    @keyframes shake {

      0%,
      100% {
        transform: translateX(0)
      }

      20%,
      60% {
        transform: translateX(-8px)
      }

      40%,
      80% {
        transform: translateX(8px)
      }
    }

    .shake {
      animation: shake .4s ease both;
    }
  </style>
</head>

<body>
  <div class="phone-frame">
    <div class="screen" style="display:flex;flex-direction:column;height:100%;">
      <div
        style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;"
        class="fade-in">
        <div
          style="width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#0d2b0d,#1a4a1a);border:2px solid rgba(61,255,32,.4);display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:20px;box-shadow:0 0 28px rgba(61,255,32,.2);">
          <i class="ph-bold ph-lock" style="color:var(--green);"></i>
        </div>
        <h2 style="font-size:22px;font-weight:800;margin-bottom:6px;">Welcome Back</h2>
        <p style="color:var(--muted);font-size:14px;margin-bottom:32px;">Enter your password to unlock.</p>
        <div class="input-wrap" style="width:100%;" id="pwWrap">
          <i class="ph-bold ph-lock icon"></i>
          <input type="password" id="pwInput" class="nova-input has-icon has-icon-right" placeholder="Password"
            autocomplete="current-password" />
          <button class="icon-right" onclick="toggle()" type="button" id="eyeBtn"><i
              class="ph-bold ph-eye"></i></button>
        </div>
        <div id="unlockError" class="error-msg mt-12" style="display:none;width:100%;">
          <i class="ph-bold ph-warning"></i> Incorrect password
        </div>
        <button class="btn btn-primary mt-20" onclick="unlock()" style="width:100%;">
          <i class="ph-bold ph-lock-open"></i> Unlock
        </button>
        <p style="font-size:13px;color:var(--muted);margin-top:20px;">
          Forgot password? <a href="../index.html" onclick="localStorage.removeItem('nv_password');return true;"
            style="color:var(--green);">Reset with SRP</a>
        </p>
      </div>
      <div style="padding:0 24px 32px;text-align:center;">
        <div
          style="font-size:11px;color:var(--muted);background:var(--surface);border-radius:10px;padding:10px;border:1px solid var(--border);">
          <i class="ph-bold ph-shield-check" style="color:var(--green);"></i>
          Your keys are stored locally. Nova never sees your password.
        </div>
      </div>
    </div>
  </div>
  <script>
    document.getElementById('pwInput').addEventListener('keydown', e => { if (e.key === 'Enter') unlock(); });
    // strip any non-printable-ASCII characters as the user types
    document.getElementById('pwInput').addEventListener('input', function () {
      const clean = this.value.replace(/[^\x20-\x7E]/g, '');
      if (clean !== this.value) this.value = clean;
    });
    const bytesToHex = b => Array.from(b).map(x => x.toString(16).padStart(2, '0')).join('');
    const hexToBytes = h => new Uint8Array(h.match(/.{2}/g).map(x => parseInt(x, 16)));
    async function sha256hex(str) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return bytesToHex(new Uint8Array(buf));
    }
    async function pbkdf2Hash(pw) {
      const salt = crypto.getRandomValues(new Uint8Array(16));
      const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveBits']);
      const bits = await crypto.subtle.deriveBits({ name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' }, km, 256);
      return bytesToHex(salt) + ':' + bytesToHex(new Uint8Array(bits));
    }
    async function pbkdf2Verify(pw, stored) {
      if (!stored || !stored.includes(':')) return false;
      const colonAt = stored.indexOf(':');
      const salt = hexToBytes(stored.slice(0, colonAt));
      const hashHex = stored.slice(colonAt + 1);
      const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveBits']);
      const bits = await crypto.subtle.deriveBits({ name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' }, km, 256);
      return bytesToHex(new Uint8Array(bits)) === hashHex;
    }
    async function deriveEncKey(pw, srpSaltHex) {
      const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
      const k = await crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt: hexToBytes(srpSaltHex), iterations: 100000, hash: 'SHA-256' },
        km, { name: 'AES-GCM', length: 256 }, true, ['encrypt', 'decrypt']
      );
      return bytesToHex(new Uint8Array(await crypto.subtle.exportKey('raw', k)));
    }
    async function encryptSrp(keyHex, srpArray) {
      const key = await crypto.subtle.importKey('raw', hexToBytes(keyHex), { name: 'AES-GCM' }, false, ['encrypt']);
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const enc = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, new TextEncoder().encode(JSON.stringify(srpArray)));
      return bytesToHex(iv) + ':' + btoa(String.fromCharCode(...new Uint8Array(enc)));
    }
    function toggle() {
      const el = document.getElementById('pwInput');
      el.type = el.type === 'password' ? 'text' : 'password';
      document.getElementById('eyeBtn').innerHTML = el.type === 'text' ? '<i class="ph-bold ph-eye-slash"></i>' : '<i class="ph-bold ph-eye"></i>';
    }
    async function unlock() {
      const v = document.getElementById('pwInput').value;
      const saved = localStorage.getItem('nv_password');
      const errEl = document.getElementById('unlockError');
      const wrap = document.getElementById('pwWrap');
      /* ── rate limiting ── */
      const lockUntil = parseInt(sessionStorage.getItem('nv_fail_until') || '0');
      if (Date.now() < lockUntil) {
        const secs = Math.ceil((lockUntil - Date.now()) / 1000);
        errEl.innerHTML = `<i class="ph-bold ph-lock"></i> Too many attempts — try again in ${secs}s`;
        errEl.style.display = 'flex';
        return;
      }
      function shake(msg) {
        const fails = parseInt(sessionStorage.getItem('nv_fail_count') || '0') + 1;
        sessionStorage.setItem('nv_fail_count', fails);
        if (fails >= 5) {
          sessionStorage.setItem('nv_fail_until', Date.now() + 30000);
          sessionStorage.removeItem('nv_fail_count');
          errEl.innerHTML = '<i class="ph-bold ph-lock"></i> Too many attempts — locked for 30 seconds';
        } else {
          errEl.innerHTML = `<i class="ph-bold ph-warning"></i> ${msg} (${fails}/5 attempts)`;
        }
        errEl.style.display = 'flex';
        wrap.classList.add('shake');
        document.getElementById('pwInput').value = '';
        setTimeout(() => wrap.classList.remove('shake'), 500);
      }
      async function finishLogin(pw) {
        sessionStorage.removeItem('nv_fail_count');
        sessionStorage.removeItem('nv_fail_until');
        const srpSaltHex = localStorage.getItem('nv_srp_salt');
        if (srpSaltHex) {
          const encKeyHex = await deriveEncKey(pw, srpSaltHex);
          sessionStorage.setItem('nv_enc_key', encKeyHex);
          // Migrate plain-JSON SRP to encrypted format if not already encrypted
          const srpStored = localStorage.getItem('nv_srp') || '';
          if (srpStored.startsWith('[') && !srpStored.includes(':')) {
            try {
              const srpArray = JSON.parse(srpStored);
              localStorage.setItem('nv_srp', await encryptSrp(encKeyHex, srpArray));
            } catch (_) { /* leave as-is */ }
          }
        }
        sessionStorage.setItem('nv_unlocked', '1');
        location.href = 'dashboard.html';
      }
      /* ── PBKDF2 path (current) ── */
      if (saved && saved.includes(':')) {
        if (await pbkdf2Verify(v, saved)) { await finishLogin(v); }
        else shake('Incorrect password');
        return;
      }
      /* ── Legacy migration: SHA-256 hash (no colon, 64-char hex) ── */
      if (saved && /^[a-f0-9]{64}$/.test(saved)) {
        const h = await sha256hex(v);
        if (h === saved) {
          /* Silently upgrade: re-hash with PBKDF2, re-encrypt SRP */
          const newSrpSalt = bytesToHex(crypto.getRandomValues(new Uint8Array(16)));
          localStorage.setItem('nv_srp_salt', newSrpSalt);
          localStorage.setItem('nv_password', await pbkdf2Hash(v));
          const encKeyHex = await deriveEncKey(v, newSrpSalt);
          const srpStored = localStorage.getItem('nv_srp') || '';
          /* SRP may be plain JSON (old format) — encrypt it now */
          if (srpStored.startsWith('[') && !srpStored.includes(':')) {
            try {
              const srpArray = JSON.parse(srpStored);
              localStorage.setItem('nv_srp', await encryptSrp(encKeyHex, srpArray));
            } catch (_) { /* leave as-is if parse fails */ }
          }
          sessionStorage.setItem('nv_enc_key', encKeyHex);
          sessionStorage.setItem('nv_unlocked', '1');
          location.href = 'dashboard.html';
        } else {
          shake('Incorrect password');
        }
        return;
      }
      /* ── Legacy migration: plain-text password ── */
      if (saved && v === saved) {
        const newSrpSalt = bytesToHex(crypto.getRandomValues(new Uint8Array(16)));
        localStorage.setItem('nv_srp_salt', newSrpSalt);
        localStorage.setItem('nv_password', await pbkdf2Hash(v));
        const encKeyHex = await deriveEncKey(v, newSrpSalt);
        const srpStored = localStorage.getItem('nv_srp') || '';
        if (srpStored.startsWith('[') && !srpStored.includes(':')) {
          try {
            const srpArray = JSON.parse(srpStored);
            localStorage.setItem('nv_srp', await encryptSrp(encKeyHex, srpArray));
          } catch (_) { /* leave as-is */ }
        }
        sessionStorage.setItem('nv_enc_key', encKeyHex);
        sessionStorage.setItem('nv_unlocked', '1');
        location.href = 'dashboard.html';
      } else {
        shake('Incorrect password');
      }
    }
  </script>
</body>

</html>
