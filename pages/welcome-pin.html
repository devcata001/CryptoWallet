<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Nova Wallet – Unlock Wallet</title>
  <link rel="stylesheet" href="../css/nova.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    @keyframes shake {

      0%,
      100% {
        transform: translateX(0)
      }

      20%,
      60% {
        transform: translateX(-8px)
      }

      40%,
      80% {
        transform: translateX(8px)
      }
    }

    .shake {
      animation: shake .4s ease both;
    }
  </style>
</head>

<body>
  <div class="phone-frame">
    <div class="screen" style="display:flex;flex-direction:column;height:100%;">
      <div
        style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;"
        class="fade-in">
        <div
          style="width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#0d2b0d,#1a4a1a);border:2px solid rgba(61,255,32,.4);display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:20px;box-shadow:0 0 28px rgba(61,255,32,.2);">
          🔒</div>
        <h2 style="font-size:22px;font-weight:800;margin-bottom:6px;">Welcome Back</h2>
        <p style="color:var(--muted);font-size:14px;margin-bottom:32px;">Enter your password to unlock.</p>
        <div class="input-wrap" style="width:100%;" id="pwWrap">
          <i class="fa fa-lock icon"></i>
          <input type="password" id="pwInput" class="nova-input has-icon has-icon-right" placeholder="Password"
            autocomplete="current-password" />
          <button class="icon-right" onclick="toggle()" type="button" id="eyeBtn"><i class="fa fa-eye"></i></button>
        </div>
        <div id="unlockError" class="error-msg mt-12" style="display:none;width:100%;">
          <i class="fa fa-triangle-exclamation"></i> Incorrect password
        </div>
        <button class="btn btn-primary mt-20" onclick="unlock()" style="width:100%;">
          <i class="fa fa-unlock"></i> Unlock
        </button>
        <p style="font-size:13px;color:var(--muted);margin-top:20px;">
          Forgot password? <a href="../index.html" onclick="localStorage.removeItem('nv_password');return true;"
            style="color:var(--green);">Reset with SRP</a>
        </p>
      </div>
      <div style="padding:0 24px 32px;text-align:center;">
        <div
          style="font-size:11px;color:var(--muted);background:var(--surface);border-radius:10px;padding:10px;border:1px solid var(--border);">
          <i class="fa fa-shield-halved" style="color:var(--green);"></i>
          Your keys are stored locally. Nova never sees your password.
        </div>
      </div>
    </div>
  </div>
  <script>
    document.getElementById('pwInput').addEventListener('keydown', e => { if (e.key === 'Enter') unlock(); });
    // strip any non-printable-ASCII characters as the user types
    document.getElementById('pwInput').addEventListener('input', function () {
      const clean = this.value.replace(/[^\x20-\x7E]/g, '');
      if (clean !== this.value) this.value = clean;
    });
    function toggle() {
      const el = document.getElementById('pwInput');
      el.type = el.type === 'password' ? 'text' : 'password';
      document.getElementById('eyeBtn').innerHTML = el.type === 'text' ? '<i class="fa fa-eye-slash"></i>' : '<i class="fa fa-eye"></i>';
    }
    function unlock() {
      const v = document.getElementById('pwInput').value;
      const saved = localStorage.getItem('nv_password');
      const errEl = document.getElementById('unlockError');
      const wrap = document.getElementById('pwWrap');
      if (saved && v === saved) {
        localStorage.setItem('nv_unlocked', '1');
        location.href = 'dashboard.html';
      } else {
        errEl.style.display = 'flex';
        wrap.classList.add('shake');
        document.getElementById('pwInput').value = '';
        setTimeout(() => wrap.classList.remove('shake'), 500);
      }
    }
  </script>
</body>

</html>
