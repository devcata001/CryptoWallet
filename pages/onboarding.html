<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Nova Wallet – Welcome</title>
  <link rel="stylesheet" href="../css/nova.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/bold/style.css" />
</head>

<body>
  <div class="phone-frame">
    <div class="screen" style="display:flex;flex-direction:column;height:100%;">
      <div
        style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px 24px;text-align:center;"
        class="fade-in">
        <div
          style="font-size:72px;line-height:1;margin-bottom:24px;filter:drop-shadow(0 0 28px rgba(61,255,32,.9));animation:glowPulse 2.5s ease-in-out infinite;">
          <i class="ph-bold ph-lock-key" style="color:var(--green);"></i></div>
        <h1 style="font-size:28px;font-weight:800;margin-bottom:10px;">Nova Wallet</h1>
        <p style="color:var(--muted);font-size:15px;max-width:280px;line-height:1.6;">
          A crypto wallet that gives you full control of your assets. No custodian. No middleman.
        </p>
      </div>
      <div style="padding:0 24px 40px;display:flex;flex-direction:column;gap:12px;" class="fade-in delay-2">
        <a class="btn btn-primary" href="features.html?mode=create">
          <i class="ph-bold ph-wallet"></i> Create a new wallet
        </a>
        <a class="btn btn-ghost" href="features.html?mode=import">
          <i class="ph-bold ph-key"></i> Import using Secret Phrase
        </a>
        <p style="font-size:11px;color:var(--muted);text-align:center;line-height:1.6;margin-top:8px;">
          By proceeding you agree to the <a href="#" style="color:var(--green);">Terms of Use</a> and
          <a href="#" style="color:var(--green);">Privacy Policy</a>
        </p>
      </div>
    </div>
  </div>
</body>

</html>
