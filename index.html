<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
    <title>Nova Wallet</title>
    <link rel="stylesheet" href="css/nova.css" />
    <style>
        .splash-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            gap: 0;
            animation: fadeInUp .6s both;
        }

        .splash-logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .splash-nova {
            font-size: 64px;
            font-weight: 900;
            color: #3DFF20;
            letter-spacing: 14px;
            text-transform: uppercase;
            line-height: 1;
            text-shadow: 0 0 40px rgba(61, 255, 32, .6), 0 0 80px rgba(61, 255, 32, .2);
            animation: glowPulse 2.5s ease-in-out infinite;
        }

        .splash-wallet {
            font-size: 32px;
            font-weight: 800;
            color: #fff;
            letter-spacing: 16px;
            text-transform: uppercase;
            line-height: 1;
            margin-top: 4px;
            opacity: .9;
        }

        .splash-bar {
            position: absolute;
            bottom: 48px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }

        .splash-bar-fill {
            height: 100%;
            background: var(--green);
            border-radius: 2px;
            animation: loadBar 2s linear forwards;
        }

        @keyframes loadBar {
            from {
                width: 0;
            }

            to {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="phone-frame">
        <div class="splash-screen">
            <div class="splash-logo">
                <div class="splash-nova">NOVA</div>
                <div class="splash-wallet">WALLET</div>
            </div>
            <div class="splash-bar">
                <div class="splash-bar-fill"></div>
            </div>
        </div>
    </div>
    <script>
        setTimeout(() => {
            const frame = document.querySelector('.phone-frame');
            frame.style.transition = 'opacity .4s';
            frame.style.opacity = '0';
            setTimeout(() => {
                location.href = localStorage.getItem('nv_password')
                    ? 'pages/welcome-pin.html'
                    : 'pages/onboarding.html';
            }, 400);
        }, 2000);
    </script>
</body>

</html>
